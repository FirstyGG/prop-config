<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prop Selector Config</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #1a1a1f; color: #fff; padding: 24px; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
  p  { font-size: 13px; color: #888; margin-bottom: 24px; }

  .card {
    background: #26262c;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #333;
  }
  .row:last-child { border-bottom: none; }

  .key   { font-size: 15px; }
  .badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 500;
  }
  .on  { background: #2a4a2a; color: #6fcf6f; }
  .off { background: #3a2a2a; color: #cf6f6f; }

  .toggle {
    width: 40px; height: 22px;
    background: #444;
    border-radius: 99px;
    position: relative;
    cursor: pointer;
    transition: background .2s;
    border: none;
    outline: none;
  }
  .toggle.active { background: #5a9a5a; }
  .toggle::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform .2s;
  }
  .toggle.active::after { transform: translateX(18px); }

  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .add-row input {
    flex: 1;
    background: #1a1a1f;
    border: 1px solid #444;
    border-radius: 8px;
    color: #fff;
    padding: 8px 12px;
    font-size: 14px;
    outline: none;
  }
  .add-row input:focus { border-color: #888; }
  button.add {
    background: #333;
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 14px;
  }
  button.add:hover { background: #444; }

  .actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-copy   { background: #2a3a4a; color: #7ab8e8; }
  .btn-export { background: #2a4a2a; color: #6fcf6f; }
  .btn:hover  { opacity: 0.85; }

  .json-box {
    background: #111;
    border-radius: 8px;
    padding: 14px;
    font-family: monospace;
    font-size: 13px;
    color: #aaa;
    margin-top: 16px;
    white-space: pre;
    overflow-x: auto;
    display: none;
  }
  .json-box.show { display: block; }

  .delete {
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 18px;
    padding: 0 8px;
    line-height: 1;
  }
  .delete:hover { color: #cf6f6f; }

  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: #333;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>Prop Selector Config</h1>
<p>จัดการ Settings สำหรับ Roblox PropSelector</p>

<div class="card" id="prop-list"></div>

<div class="add-row">
  <input id="new-key" placeholder="ชื่อ Tag เช่น Trees" />
  <button class="add" onclick="addProp()">+ เพิ่ม</button>
</div>

<div class="actions">
  <button class="btn btn-copy"   onclick="copyJSON()">Copy JSON</button>
  <button class="btn btn-export" onclick="toggleJSON()">ดู JSON</button>
</div>

<div class="json-box" id="json-box"></div>
<div class="toast"   id="toast"></div>

<script>
// ค่าเริ่มต้น
const GITHUB_TOKEN = "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"  // ใส่ token ที่ได้
const REPO         = "FirstyGG/prop-config"
const FILE         = "settings.json"

async function saveToGitHub() {
    // ดึง SHA ของไฟล์เดิมก่อน (จำเป็นสำหรับ update)
    const fileRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
        headers: { Authorization: `token ${GITHUB_TOKEN}` }
    })
    const fileData = await fileRes.json()

    // อัปเดตไฟล์
    await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
        method: "PUT",
        headers: {
            Authorization: `token ${GITHUB_TOKEN}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "update settings",
            content: btoa(getJSON()),  // แปลงเป็น base64
            sha: fileData.sha
        })
    })

    showToast("บันทึกแล้ว!")
}
let props = JSON.parse(localStorage.getItem("props") || "null") || {
  Trees:  true,
  Rocks:  false,
  Lights: true,
}

function save() {
  localStorage.setItem("props", JSON.stringify(props))
  renderJSON()
}

function render() {
  const list = document.getElementById("prop-list")
  list.innerHTML = Object.keys(props).length === 0
    ? `<p style="color:#666;font-size:13px">ยังไม่มี Prop</p>`
    : ""

  for (const [key, val] of Object.entries(props)) {
    const row = document.createElement("div")
    row.className = "row"
    row.innerHTML = `
      <span class="key">${key}</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="badge ${val ? "on" : "off"}">${val ? "แสดง" : "ซ่อน"}</span>
        <button class="toggle ${val ? "active" : ""}" onclick="toggleProp('${key}')"></button>
        <button class="delete" onclick="deleteProp('${key}')">×</button>
      </div>
    `
    list.appendChild(row)
  }
  save()
}

function toggleProp(key) {
  props[key] = !props[key]
  render()
}

function deleteProp(key) {
  delete props[key]
  render()
}

function addProp() {
  const input = document.getElementById("new-key")
  const key   = input.value.trim()
  if (!key) return
  if (props[key] !== undefined) { showToast("Tag นี้มีอยู่แล้ว"); return }
  props[key] = true
  input.value = ""
  render()
}

function getJSON() {
  return JSON.stringify(props, null, 2)
}

function renderJSON() {
  document.getElementById("json-box").textContent = getJSON()
}

function toggleJSON() {
  const box = document.getElementById("json-box")
  box.classList.toggle("show")
  renderJSON()
}

function copyJSON() {
  navigator.clipboard.writeText(getJSON())
  showToast("Copy แล้ว!")
}

function showToast(msg) {
  const t = document.getElementById("toast")
  t.textContent = msg
  t.classList.add("show")
  setTimeout(() => t.classList.remove("show"), 2000)
}

// Enter เพื่อเพิ่ม
document.getElementById("new-key").addEventListener("keydown", e => {
  if (e.key === "Enter") addProp()
})

render()
</script>
</body>
</html>
<button class="btn btn-save" onclick="saveToGitHub()">💾 Save to GitHub</button>
